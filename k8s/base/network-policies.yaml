# Allow only guestbook-api namespace to access MySQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-mysql
  namespace: guestbook-db
spec:
  podSelector:
    matchLabels:
      app: mysql
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          app: guestbook
          tier: backend
    ports:
    - port: 3306
      protocol: TCP
---
# Allow only guestbook-ui namespace to access API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ui-to-api
  namespace: guestbook-api
spec:
  podSelector:
    matchLabels:
      app: guestbook-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          app: guestbook
          tier: frontend
    ports:
    - port: 8080
      protocol: TCP
---
# Allow external traffic to UI
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-to-ui
  namespace: guestbook-ui
spec:
  podSelector:
    matchLabels:
      app: guestbook-ui
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - port: 80
      protocol: TCP
