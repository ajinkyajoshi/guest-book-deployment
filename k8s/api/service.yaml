apiVersion: v1
kind: Service
metadata:
  name: guestbook-api
  namespace: guestbook-api
spec:
  type: ClusterIP
  selector:
    app: guestbook-api
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: guestbook-api-hpa
  namespace: guestbook-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: guestbook-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
